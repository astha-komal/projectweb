<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Passenger Details - EasyBus</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="passenger-page">
<form onsubmit="return goToConfirm()">
<div class="main">
    <div class="card">
        <h2>Passenger Details</h2>
        <div class="form-group">
            <label for="name">Name *</label>
            <input type="text" placeholder="Enter Name" id="name"
                   pattern="[A-Za-z ]+" title="Only alphabets allowed" required>
        </div>
        <div class="form-group">
            <label for="age">Age *</label>
            <input type="number" placeholder="Enter Age" id="age"
                   min="1" max="120" required>
        </div>
        <label>Gender *</label>
        <div class="gender">
            <label><input type="radio" name="gender" value="Male"> Male</label>
            <label><input type="radio" name="gender" value="Female"> Female</label>
            <label><input type="radio" name="gender" value="Other"> Other</label>
        </div>
    </div>

    <div class="card">
        <h2>Contact Details</h2>
        <p>Ticket details will be sent to</p>

        <div class="form-group phone-row">
            <select>
                <option>+91 (IND)</option>
                <option>+1 (USA)</option>
            </select>
            <input type="tel" placeholder="Phone *" name="phone"
                   pattern="[0-9]{10}" title="Enter 10 digit phone number" required>
        </div>
        <div class="form-group">
            <label>Email ID</label>
            <input type="email" placeholder="Enter Email" required>
        </div>
        <div class="form-group">
            <label>State of Residence *</label>
            <select name="state" required>
                <option value="">Select State</option>
                <option>Tamil Nadu</option>
                <option>Karnataka</option>
                <option>Kerala</option>
                <option>Andhra Pradesh</option>
                <option>Telangana</option>
                <option>Maharashtra</option>
            </select>
        </div>

        <div id="foot">Required for GST Tax Invoicing</div>

        <div class="form-group">
            <button type="submit" class="submit-btn">Continue to Confirm →</button>
        </div>
    </div>
</div>
</form>
<script src="js/auth.js"></script>
<script src="js/passenger.js"></script>
</body>
</html>
