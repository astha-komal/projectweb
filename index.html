<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>EasyBus - Bus Ticket Booking</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    EasyBus - Online Bus Ticket Booking
</header>

<div id="links">
    <a href="index.html">Home</a>
    <a href="booking.html">My Bookings</a>
    <a href="profile.html" id="nav-profile">Profile</a>
    <a href="help.html">Help?</a>
    <a href="login.html" id="nav-login">Login</a>
    <a href="#" id="nav-logout" onclick="logoutUser()">Logout</a>
</div>

<div class="banner">
    Book Your Bus Tickets Easily
</div>

<div class="booking-box">
    <h2>Search Bus</h2>
    <input type="text" id="from" placeholder="From (e.g. Vellore)"
           pattern="[A-Za-z ]+" title="Only alphabets allowed" required>
    <input type="text" id="to" placeholder="To (e.g. Chennai)"
           pattern="[A-Za-z ]+" title="Only alphabets allowed" required>
    <input type="date" id="travelDate" required>
    <br><br>
    <button type="button" onclick="goToBus()">Search Buses</button>
</div>

<footer>
    &copy; 2026 EasyBus. All Rights Reserved.
</footer>

<script src="js/auth.js"></script>
<script src="js/main.js"></script>
</body>
</html>
