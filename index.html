<body>

<header>
    EasyBus - Online Bus Ticket Booking

<div class="banner">
    Book Your Bus Tickets Easily
</div>

<div class="booking-box">
    <h2>Search Bus</h2>
    <input type="text" id="from" placeholder="From " pattern="[A-Za-z ]+" title="Only alphabets allowed" required>
    <input type="text" id="to" placeholder="To " pattern="[A-Za-z ]+" title="Only alphabets allowed" required>
    <input type="date" id="travelDate" required>
    <br><br>
    <button type="button" onclick="goToBus()">Search Buses</button>
</div>
